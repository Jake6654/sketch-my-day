name: AI Service CI

on:
  push:
    paths:
      - "ai-service/**"
      - "image-server/**"
      - "docker-compose.yml"
      - ".github/workflows/ai-service-ci.yml"
  pull_request:
    paths:
      - "ai-service/**"
      - "image-server/**"
      - "docker-compose.yml"
      - ".github/workflows/ai-service-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ai-service dependencies
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import ai-service modules
        working-directory: ai-service
        env:
          OPENAI_API_KEY: test-key
          REDIS_URL: redis://localhost:6379/0
          IMAGE_PROVIDER: self_hosted
          IMAGE_MODEL_SERVER_URL: http://localhost:8001
        run: |
          python -m compileall app
          python -c "import app.main"

      - name: Install image-server dependencies
        working-directory: image-server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import image-server modules
        working-directory: image-server
        run: |
          python -m compileall app
          python -c "import app.main"

      - name: Build Docker Compose services
        run: |
          docker compose build ai-service image-server
