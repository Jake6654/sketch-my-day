services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  image-server:
    build:
      context: ./image-server
    ports:
      - "8001:8001"
    environment:
      IMAGE_SERVER_PROVIDER: huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      IMAGE_PROVIDER: self_hosted
      IMAGE_MODEL_SERVER_URL: http://image-server:8001
      IMAGE_MODEL_TIMEOUT_SECONDS: "300"
    depends_on:
      redis:
        condition: service_started
      image-server:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      OPSLENS_URL: http://host.docker.internal:8081
      OPSLENS_PROJECT: sketch-my-day
      OPSLENS_ENVIRONMENT: dev
    depends_on:
      ai-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_started
