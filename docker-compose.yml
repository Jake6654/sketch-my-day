services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  image-server:
    build:
      context: ./image-server
    ports:
      - "8001:8001"
    environment:
      IMAGE_SERVER_PROVIDER: mock
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      IMAGE_PROVIDER: self_hosted
      IMAGE_MODEL_SERVER_URL: http://image-server:8001
      IMAGE_MODEL_TIMEOUT_SECONDS: "300"
    depends_on:
      redis:
        condition: service_started
      image-server:
        condition: service_healthy
